font:
  normal:
    family: IBM Plex Mono Text
    style: Regular

  bold:
    family: IBM Plex Mono Text
    style: Bold

  italic:
    family: IBM Plex Mono Text
    style: Italic

  bold_italic:
    family: IBM Plex Mono Text
    style: Bold Italic

  size: 14

