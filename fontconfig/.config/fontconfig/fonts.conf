<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
 <match target="font">
  <edit name="rgba" mode="assign">
   <const>rgb</const>
  </edit>
 </match>
 <match target="font">
  <edit name="hintstyle" mode="assign">
   <const>hintfull</const>
  </edit>
 </match>
 <match target="font">
  <edit name="antialias" mode="assign">
   <bool>true</bool>
  </edit>
 </match>
 <!-- Map fonts that are commonly used by web pages to our preferred fonts -->
 <match target="pattern">
  <test qual="any" name="family">
   <string>Liberation Sans</string>
  </test>
  <edit name="family" binding="same" mode="assign">
   <string>sans-serif</string>
  </edit>
 </match>
 <match target="pattern">
  <test qual="any" name="family">
   <string>Liberation Mono</string>
  </test>
  <edit name="family" binding="same" mode="assign">
   <string>monospace</string>
  </edit>
 </match>
 <!-- Default font for the zh_CN locale (no fc-match pattern) -->
 <match>
  <test name="lang" compare="contains">
   <string>zh_CN</string>
  </test>
  <edit name="family" mode="prepend">
   <string>HarmonyOS Sans SC</string>
  </edit>
 </match>
 <!-- Default sans-serif font -->
 <match target="pattern">
  <test qual="any" name="family">
   <string>sans-serif</string>
  </test>
  <edit name="family" binding="same" mode="prepend">
   <string>Inter Display</string>
  </edit>
 </match>
 <!-- Default serif fonts -->
 <match target="pattern">
  <test qual="any" name="family">
   <string>serif</string>
  </test>
  <edit name="family" binding="same" mode="prepend">
   <string>Zhuque Fangsong (technical preview)</string>
  </edit>
 </match>
 <!-- Default monospace fonts -->
 <match target="pattern">
  <test qual="any" name="family">
   <string>monospace</string>
  </test>
  <edit name="family" binding="same" mode="prepend">
   <string>CaskaydiaCove NF</string>
  </edit>
 </match>
 <!-- Fallback fonts preference order -->
 <alias>
  <family>sans-serif</family>
  <prefer>
   <family>Inter Display</family>
   <family>HarmonyOS Sans SC</family>
   <family>HarmonyOS Sans TC</family>
   <family>HarmonyOS Sans JP</family>
   <family>HarmonyOS Sans KR</family>
   <family>Noto Color Emoji</family>
   <family>Noto Emoji</family>
  </prefer>
 </alias>
 <alias>
  <family>serif</family>
  <prefer>
   <family>Noto Serif</family>
   <family>Zhuque Fangsong (technical preview)</family>
   <family>Noto Serif CJK SC</family>
   <family>Noto Serif CJK TC</family>
   <family>Noto Serif CJK JP</family>
   <family>Noto Serif CJK KR</family>
   <family>Noto Color Emoji</family>
   <family>Noto Emoji</family>
  </prefer>
 </alias>
 <alias>
  <family>monospace</family>
  <prefer>
   <family>CaskaydiaCove NF</family>
   <family>Noto Color Emoji</family>
   <family>Noto Emoji</family>
  </prefer>
 </alias>
 <selectfont>
  <rejectfont>
   <pattern>
    <patelt name="family">
     <!-- This font is causing problem with GitHub -->
     <string>Nimbus Sans</string>
    </patelt>
   </pattern>
  </rejectfont>
 </selectfont>
 <dir>~/.fonts</dir>
</fontconfig>
