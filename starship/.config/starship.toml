[character]
error_symbol = "[❯](bold #ed8796)"
success_symbol = "[❯](bold #cad3f5)"

[cmd_duration]
style = "bold #f4dbd6"

[directory]
style = "bold #a6da95"

[git_branch]
style = "bold #f5a97f"

[git_status]
style = "bold #ee99a0"

[hostname]
style = "bold #ee99a0"

[username]
format = "[$user]($style) on "
style_user = "bold #bd93f9"
