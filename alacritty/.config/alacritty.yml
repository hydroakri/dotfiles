# Template
# https://github.com/alacritty/alacritty/blob/master/alacritty.yml
font:
  normal:
    family: Hack Nerd Font  
    style: Regular

  bold:
    family: Hack Nerd Font  
    style: Bold

  italic:
    family: Hack Nerd Font  
    style: Italic

  bold_italic:
    family: Hack Nerd Font  
    style: Bold Italic

  size: 16

window:
   dimensions:
     columns: 80
     lines: 24

