name: Build and Push to Attic Cache

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64-linux
            runner: ubuntu-24.04-arm
            target: .#nixosConfigurations.oci.config.system.build.toplevel

          - arch: aarch64-linux
            runner: ubuntu-24.04-arm
            target: .#nixosConfigurations.rpi4-side-gateway.config.system.build.toplevel
          
          - arch: aarch64-linux
            runner: ubuntu-24.04-arm
            target: .#nixosConfigurations.rpi4-switch.config.system.build.toplevel

          - arch: x86_64-linux
            runner: ubuntu-latest
            target: .#nixosConfigurations.omen15.config.system.build.toplevel

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space (x86_64 only)
        if: runner.arch == 'X64'
        run: |
          # 手动清理 GitHub Runner 预装的大型软件，腾出约 20-30GB 空间
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            max-jobs = auto
            cores = 0

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Setup Attic Cache
        uses: ryanccn/attic-action@v0
        with:
          endpoint: https://cache.hydroakri.cc
          cache: cachix
          token: ${{ secrets.ATTIC_TOKEN }}

      - name: Setup LanTian Cache
        run: |
          printf '\nextra-substituters = https://attic.xuyh0120.win/lantian\nextra-trusted-public-keys = lantian:EeAUQ+W+6r7EtwnmYjeVwx5kOGEBpjlBfPlzGlTNvHc=\n' >> ~/.config/nix/nix.conf

      - name: Build System (${{ matrix.arch }})
        working-directory: ./flake
        run: |
          nix config show | grep -E "substituters|trusted-public-keys"
          nix build ${{ matrix.target }} \
            --accept-flake-config \
            --print-build-logs \
            --fallback
