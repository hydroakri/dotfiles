# Template
# https://github.com/alacritty/alacritty/blob/master/alacritty.yml
font:
  normal:
    family: Sarasa Mono SC Nerd
    style: Regular

  bold:
    family: Sarasa Mono SC Nerd
    style: Bold

  italic:
    family: Sarasa Mono SC Nerd
    style: Italic

  bold_italic:
    family: Sarasa Mono SC Nerd
    style: Bold Italic

  size: 12

