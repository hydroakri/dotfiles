
########################################################################################
AUTOGENERATED HYPR CONFIG.
PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
########################################################################################
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
#env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1

env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_STYLE_OVERRIDE,Breeze
env = QT_QPA_PLATFORM, wayland;xcb
env = GDK_BACKEND, wayland,x11

env = WLR_RENDERER,vulkan
#enable nvidia vertical sync
env = __GL_SYNC_TO_VBLANK,1
#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

#autogenerated = 1 # remove this line to remove the warning

# See https://wiki.hyprland.org/Configuring/Monitors/

monitor=,preferred,auto,1.25
#monitor=,highres,auto,1
#exec-once=xprop -root -f _XWAYLAND_GLOBAL_OUTPUT_SCALE 32c -set _XWAYLAND_GLOBAL_OUTPUT_SCALE 1.25
#env = GDK_SCALE,1.25
#env = XCURSOR_SIZE,32

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = waybar
exec-once = mako
exec-once = copyq
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = pasystray
exec-once = fcitx5
exec-once = playerctld && mpris-proxy
exec-once = swayidle -w timeout 300 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on' timeout 600 'swaylock -f -c 000000' before-sleep 'swaylock -c 000000 -f'
exec-once = /home/$USER/script/autostart

#paper
exec-once = swaybg -i $(find ~/Pictures/wllppr/. -name "*.*g" | shuf -n1) -m fill
#exec-once = mpvpaper -o "--mute --loop-playlist --hwdec=auto" eDP-1 /home/hydroakri/VIDEOS/mpvpaper/Snowfall.mp4

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

#windowrulev2 = float,floating:0


# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5 #6
    gaps_out = 10 #12
    border_size = 0
    col.active_border = rgba(7f7f7f7f)
    col.inactive_border = rgba(7f7f7f7f)
    layout = master #dwindle master
    apply_sens_to_raw = true
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    multisample_edges = true
    rounding = 9 #5
    #blur {
    #    enabled = 0
    #    size = 4
    #    passes = 4
    #    new_optimizations = true
    #    ignore_opacity = false
    #}
    active_opacity = 1
    inactive_opacity = 1

    drop_shadow = true
    shadow_ignore_window = true
    shadow_range = 64
    shadow_render_power = 2
    shadow_offset = 0 0
    col.shadow = rgba(00000088)
    col.shadow_inactive = rgba(00000000)
}

animations {
    enabled = true
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1

    animation = windows, 1, 5, overshot, slide
    animation = windowsOut, 1, 4, smoothOut, slide
    animation = windowsMove, 1, 4, default
    animation = border, 1, 10, default
    animation = fade, 1, 10, smoothIn
    animation = fadeDim, 1, 10, smoothIn
    animation = workspaces, 1, 6, overshot, slidevert
    #enabled = yes

    ## Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    #bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    #animation = windows, 1, 7, myBezier
    #animation = windowsOut, 1, 7, default, popin 80%
    #animation = border, 1, 10, default
    #animation = fade, 1, 7, default
    #animation = workspaces, 1, 6, default
}

dwindle {
    no_gaps_when_only = false
    force_split = 0 
    split_width_multiplier = 1.0 
    use_active_for_splits = true
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
    default_split_ratio = 1.2
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
    orientation = left
    mfact = 0.618
}

xwayland {
  force_zero_scaling = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = on
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device:epic mouse V1 {
    sensitivity = -0.5
}

binds {
    scroll_event_delay = 0
    }

misc {
    disable_hyprland_logo = true
    always_follow_on_dnd = true
    layers_hog_keyboard_focus = false
    animate_manual_resizes = false
    enable_swallow = true
    swallow_regex = true
    focus_on_activate = true
    no_direct_scanout = true
    vfr = true
    disable_autoreload = true
}
# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, alacritty
bind = $mainMod, Q, killactive, 
bind = CTRL_ALT, backspace, exit, 
bind=  ,F11,fullscreen,
bind = SUPER, C, movetoworkspace, special
bind = SUPER, S, togglespecialworkspace
bind = SUPER, O, exec, ~/.config/hypr/toogleblur.sh
#bind = $mainMod, D, exec, rofi -combi-modi drun -show combi -icon-theme "Papirus" -show-icons
bind = $mainMod, D, exec, wofi
bind = $mainMod, Space, togglefloating, 
bind = $mainMod, z, pseudo, # dwindle
bind = $mainMod, x, togglesplit, # dwindle
bind = $mainMod, x, layoutmsg, swapwithmaster master, # master
bind = ,Print, exec, grim -g "$(slurp)"
bind=SUPER,E,exec, dolphin
bind = $mainMod, w, exec, killall -SIGUSR1 waybar
bind=CTRL,Escape,exec,swaylock -c 300924 -f
#bind=SUPER,B,exec, microsoft-edge-stable --ozone-platform-hint=auto --gtk-version=4
bind=SUPER,B,exec, ALL_PROXY=127.0.0.1:7890 brave --ozone-platform-hint=auto --gtk-version=4

bind = , XF86AudioRaiseVolume ,exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume ,exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute ,exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86AudioMicMute ,exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bind = , XF86MonBrightnessDown ,exec, brightnessctl set 5%-
bind = , XF86MonBrightnessUp ,exec, brightnessctl set 5%+

# Move focus with mainMod + vim keys
# bind = SUPER,Tab,cyclenext,
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

#move window
bind=SUPERSHIFT,h,movewindow,l
bind=SUPERSHIFT,l,movewindow,r
bind=SUPERSHIFT,k,movewindow,u
bind=SUPERSHIFT,j,movewindow,d

#resize window
bind = SUPER CTRL, h, resizeactive, -20 0
bind = SUPER CTRL, l, resizeactive, 20 0
bind = SUPER CTRL, k, resizeactive, 0 -20
bind = SUPER CTRL, j, resizeactive, 0 20

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

bind = $mainMod_SHIFT, n, movetoworkspace, +1 
bind = $mainMod_SHIFT, p, movetoworkspace, -1 
bind = $mainMod_SHIFT, mouse_down, movetoworkspacesilent, -1 
bind = $mainMod_SHIFT, mouse_up, movetoworkspacesilent, +1 

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, -1
bind = $mainMod, mouse_up, workspace, +1
bind = $mainMod, n, workspace, +1
bind = $mainMod, p, workspace, -1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# group control
bind=SUPER,g,togglegroup
bind=SUPER,Tab,changegroupactive

#window rules
windowrule = float, QQ
windowrule = float, Xwayland
windowrule = float, title:^(Xwayland)$
windowrule = float, title:^(mako)$
windowrule = float, title:^(rofi)$
#windowrule = float, title:^(Alacritty)$
windowrule = float, pavucontrol
windowrule = float, wezterm
windowrule = float, yesplaymusic
windowrule = float, flameshot
windowrule = float, title:^(Bluetooth)$
windowrule = float, xfce4-appfinder
windowrule = float, steam
windowrulev2 = float, class:(org.kde.polkit-kde-authentication-agent-1)
layerrule = blur, waybar
blurls=waybar
layerrule = blur, wofi
blurls=wofi
#windowrule = noblur,^(firefox)$
